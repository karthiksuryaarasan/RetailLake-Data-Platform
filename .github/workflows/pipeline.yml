name: ELT Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'   # Daily 1 AM UTC

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 pipeline/ --max-line-length=100 --ignore=E501,W503 || true

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short || true

  # ── Job 2: Run Pipeline ───────────────────────────────────────────────────
  run-pipeline:
    name: Run ELT Pipeline
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
  run: |
    python - <<EOF
    from pipeline.generate_data import *

    customers = generate_customers()
    products = generate_products()
    orders = generate_orders(customers, products)

    write_to_delta(customers, "data/raw/delta/customers", "Customers")
    write_to_delta(products, "data/raw/delta/products", "Products")
    write_to_delta(orders, "data/raw/delta/orders", "Orders")
    EOF

      - name: Run Extract
        run: python -m pipeline.extract

      - name: Run Transform
        run: python -m pipeline.transform

      - name: Run Load + Quality Checks
        run: python -m pipeline.load

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-outputs
          path: |
            data/mart/
            *.log
          retention-days: 7

  # ── Job 3: Deploy Dashboard ───────────────────────────────────────────────
  deploy:
    name: Deploy Streamlit Dashboard
    runs-on: ubuntu-latest
    needs: run-pipeline
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify deployment
        run: |
          echo "✅ Pipeline passed all quality checks"
          echo "🚀 Dashboard auto-deployed at Streamlit Cloud"
          echo "📊 Visit: https://your-app.streamlit.app"
