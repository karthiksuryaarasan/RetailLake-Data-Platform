name: ELT Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'

jobs:

  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install flake8
          flake8 pipeline/ || true

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v || true


  run-pipeline:
    name: Run ELT Pipeline
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Full Pipeline
        run: |
          python run_pipeline.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: data/
          retention-days: 5


  deploy:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: run-pipeline

    steps:
      - name: Deployment message
        run: |
          echo "Pipeline Successful"
          echo "Dashboard Ready"